name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Enable pnpm
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright Chromium
        run: pnpm exec playwright install --with-deps chromium

      - name: Build production bundle
        run: pnpm run build

      - name: Check deploy bundle
        run: pnpm run check:deploy

      - name: Check home interactions
        run: pnpm run check:e2e

      - name: Check role visibility
        run: pnpm run check:roles

      - name: Check order flow
        run: pnpm run check:order-flow

      - name: Check rider mode
        run: pnpm run check:rider-mode

      - name: Check native shell
        run: pnpm run check:native

      - name: Prepare Pages files
        run: |
          touch dist/.nojekyll
          cat > dist/index.html <<'HTML'
          <!doctype html><html><head><meta charset="utf-8"><meta http-equiv="refresh" content="0; url=./index.react.html"><title>FitNow</title></head><body><a href="./index.react.html">Open FitNow</a></body></html>
          HTML

      - name: Publish gh-pages branch
        run: |
          cd dist
          git init
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b gh-pages
          git add -A
          git commit -m "Deploy FitNow static build"
          git push --force "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git" gh-pages
